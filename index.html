<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Swiper</title>
<style>
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1000px 700px at 50% -10%,#10243a,#070a16 60%);color:#fff;
    min-height:100vh;margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 22px;}
  h1{font-size:40px;margin:18px 0 6px;background:linear-gradient(180deg,#fff,#9ff0e0);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  p{color:#9fb2c4;font-size:17px;max-width:520px;line-height:1.55;margin:0 0 28px;}
  .links{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  a.btn{color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:12px 20px;border-radius:16px;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);}
  a.btn:hover{background:rgba(255,255,255,.18);}
  .logo{width:104px;height:104px;border-radius:26px;object-fit:cover;display:block;
    box-shadow:0 20px 50px -12px rgba(0,200,255,.5);}
  footer{margin-top:40px;color:#5a6b7a;font-size:13px;}
</style>
</head>
<body>
  <img class="logo" src="icon.png" alt="Bill Swiper">
  <h1>Bill Swiper</h1>
  <p>Scan a restaurant bill, swipe each dish to a guest, and split the check in seconds.</p>
  <div class="links">
    <a class="btn" href="privacy.html">Privacy Policy</a>
    <a class="btn" href="terms.html">Terms of Use</a>
  </div>
  <footer>© 2026 Bill Swiper</footer>
</body>
</html>
